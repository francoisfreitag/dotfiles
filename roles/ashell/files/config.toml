[modules]
left = ["Workspaces", "WindowTitle"]
center = [["Clock"]]
right = ["SystemInfo", "Tray", ["Privacy", "Settings"]]

[settings]
indicators = ["IdleInhibitor", "Audio", "Bluetooth", "Network", "Vpn", "Battery"]
shutdown_cmd = "systemctl poweroff"

[appearance]
font_name = "Fira Code"
scale_factor = 1.0
opacity = 0.9

# https://malpenzibo.github.io/ashell/docs/configuration/appearance/theme
success_color = "#a6e3a1"
text_color = "#cdd6f4"

workspace_colors = [ "#fab387", "#b4befe", "#cba6f7" ]

[appearance.primary_color]
base = "#fab387"
text = "#1e1e2e"

[appearance.danger_color]
base = "#f38ba8"
weak = "#f9e2af"

[appearance.background_color]
base = "#1e1e2e"
weak = "#313244"
strong = "#45475a"

[appearance.secondary_color]
base = "#11111b"
strong = "#1b1b25"
